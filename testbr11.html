<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stack Scroll Slider</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  font-family:Arial, Helvetica, sans-serif;
  height:300vh;
  overflow-x:hidden;
}

.container{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1200px;
}

.slider{
  position:relative;
  width:320px;
  height:480px;
}

.card{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:bold;
  color:white;
  box-shadow:0 25px 50px rgba(0,0,0,0.5);
  backface-visibility:hidden;
}

/* Different colors */
.card:nth-child(1){ background:#d00000; }
.card:nth-child(2){ background:#6c757d; }
.card:nth-child(3){ background:#9d4edd; }
.card:nth-child(4){ background:#40916c; }
.card:nth-child(5){ background:#bc6c25; }

</style>
</head>

<body>

<div class="container">
  <div class="slider">

    <div class="card">Red Profile</div>
    <div class="card">Gray Profile</div>
    <div class="card">Purple Profile</div>
    <div class="card">Green Profile</div>
    <div class="card">Gold Profile</div>

  </div>
</div>

<script>

gsap.registerPlugin(ScrollTrigger);

const cards = gsap.utils.toArray(".card");
const total = cards.length;

// Initial stacked position
function setStack() {
  cards.forEach((card, i) => {
    gsap.set(card, {
      y: i * 25,
      z: -i * 60,
      scale: 1 - i * 0.05,
      opacity: i === 0 ? 1 : 0.7
    });
  });
}

setStack();

ScrollTrigger.create({
  trigger: ".container",
  start: "top top",
  end: "+=2500",
  scrub: true,
  pin: true,
  onUpdate: (self) => {

    let progress = self.progress * total;

    cards.forEach((card, i) => {

      let position = i - progress;

      gsap.to(card, {
        y: position * 25,
        z: -position * 60,
        scale: 1 - position * 0.05,
        opacity: position < 0 ? 0 : 1,
        duration: 0.3,
        ease: "power2.out"
      });

    });

  }
});

</script>

</body>
</html>
